[build]
  base = "."
  command = "npx nx run-many -t build --projects=ngx-lift,clr-lift --no-cloud && npx nx build demo --configuration=production --no-cloud"
  publish = "dist/apps/demo/browser"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "24"
  NPM_VERSION = "10"
  NX_DAEMON = "false"
  NX_NO_CLOUD = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

