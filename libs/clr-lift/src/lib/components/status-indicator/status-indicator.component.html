<span class="status-container">
  @if (tooltip(); as tooltip) {
    <button
      class="btn btn-icon"
      [cllTooltip]="tooltip"
      [cllTooltipPosition]="tooltipPosition()"
      [attr.aria-label]="tooltip"
    >
      <ng-container *ngTemplateOutlet="icon"></ng-container>
    </button>
  } @else {
    <ng-container *ngTemplateOutlet="icon"></ng-container>
  }

  <ng-content />
</span>

<ng-template #icon>
  @switch (iconStatus()) {
    @case ('success') {
      <clr-icon
        shape="success-standard"
        status="success"
        [size]="iconSize()"
        [attr.aria-label]="'status-indicator.success' | translate"
      />
    }
    @case ('error') {
      <clr-icon
        shape="error-standard"
        status="danger"
        [size]="iconSize()"
        [attr.aria-label]="'status-indicator.error' | translate"
      />
    }
    @case ('pending') {
      <clr-icon
        shape="sync"
        status="info"
        [size]="iconSize()"
        [attr.aria-label]="'status-indicator.pending' | translate"
      />
    }
    @case ('warning') {
      <clr-icon
        shape="warning-standard"
        status="warning"
        [size]="iconSize()"
        [attr.aria-label]="'status-indicator.warning' | translate"
      />
    }
    @case ('inactive') {
      <clr-icon
        shape="disconnect"
        status="danger"
        [size]="iconSize()"
        [attr.aria-label]="'status-indicator.inactive' | translate"
      />
    }
    @default {
      <clr-icon shape="unknown-status" [size]="iconSize()" [attr.aria-label]="'status-indicator.unknown' | translate" />
    }
  }
</ng-template>
