<button
  cds-layout="m:none"
  class="btn btn-link nav-link"
  [attr.aria-label]="ariaLabel()"
  (click)="toggleTheme()"
  (mouseenter)="setHovering(true)"
  (mouseleave)="setHovering(false)"
>
  <clr-icon size="md" class="theme-toggle" [shape]="iconShape()" [inverse]="hovering()" [solid]="hovering()" />
  {{ themeDisplayName() }}
</button>
